<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for main background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>

    <!-- Gradient for the X -->
    <linearGradient id="xGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- AI circuit pattern -->
    <pattern id="circuit" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="2" fill="#00d4ff" opacity="0.2"/>
      <circle cx="56" cy="8" r="2" fill="#00d4ff" opacity="0.2"/>
      <circle cx="8" cy="56" r="2" fill="#00d4ff" opacity="0.2"/>
      <circle cx="56" cy="56" r="2" fill="#00d4ff" opacity="0.2"/>
      <circle cx="32" cy="32" r="3" fill="#00ff88" opacity="0.3"/>
      <line x1="8" y1="8" x2="32" y2="32" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
      <line x1="56" y1="8" x2="32" y2="32" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
      <line x1="8" y1="56" x2="32" y2="32" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
      <line x1="56" y1="56" x2="32" y2="32" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGradient)" stroke="#00d4ff" stroke-width="4"/>

  <!-- Circuit pattern overlay -->
  <circle cx="256" cy="256" r="246" fill="url(#circuit)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.2"/>

  <!-- BAGS text arc (top) -->
  <path id="topArc" d="M 100 256 A 156 156 0 0 1 412 256" fill="none"/>
  <text fill="#00d4ff" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" letter-spacing="12">
    <textPath href="#topArc" startOffset="25%">BAGS</textPath>
  </text>

  <!-- Main X symbol -->
  <g filter="url(#glow)">
    <!-- X left stroke -->
    <path d="M 150 160 L 280 256 L 150 352"
          fill="none"
          stroke="url(#xGradient)"
          stroke-width="32"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- X right stroke -->
    <path d="M 362 160 L 232 256 L 362 352"
          fill="none"
          stroke="url(#xGradient)"
          stroke-width="32"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Center AI node -->
  <circle cx="256" cy="256" r="24" fill="#0f0f23" stroke="#00ff88" stroke-width="4"/>
  <circle cx="256" cy="256" r="12" fill="#00ff88"/>
  <circle cx="256" cy="256" r="6" fill="#ffffff"/>

  <!-- AI brain connectors -->
  <line x1="256" y1="232" x2="256" y2="180" stroke="#00ff88" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="280" x2="256" y2="332" stroke="#00ff88" stroke-width="3" opacity="0.6"/>
  <line x1="232" y1="256" x2="180" y2="256" stroke="#00ff88" stroke-width="3" opacity="0.6"/>
  <line x1="280" y1="256" x2="332" y2="256" stroke="#00ff88" stroke-width="3" opacity="0.6"/>

  <!-- Corner nodes -->
  <circle cx="180" cy="180" r="8" fill="#00d4ff"/>
  <circle cx="332" cy="180" r="8" fill="#00d4ff"/>
  <circle cx="180" cy="332" r="8" fill="#00d4ff"/>
  <circle cx="332" cy="332" r="8" fill="#00d4ff"/>

  <!-- "AI" label bottom -->
  <text x="256" y="420" fill="#00ff88" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="4">AI POWERED</text>
</svg>
